<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Pokémon Fire Red</title>

  <link rel="shortcut icon" href="imagens/pokemon_go_play_game_cinema_film_movie_icon-icons.com_69163 (1).svg" type="image/x-icon">

  <style>

@import url('https://fonts.googleapis.com/css2?family=Open+Sans:ital,wght@0,300..800;1,300..800&display=swap');

@import url('https://fonts.googleapis.com/css2?family=Boldonse&display=swap');

    body {
      background-image: url(imagens/sky.jpg);
      background-repeat: no-repeat;
      background-size: cover;
      background-position: center;
      background-attachment: fixed;
           font-family: 'Open Sans', sans-serif;

      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
    }

    h1 {
        font-family: 'Boldonse';
        font-weight: 500;
        margin-bottom: 50px;
        color: #ffcb05;
        text-shadow: 4px 8px #2a75bb;

    }

   #game {
    width: 1600px;
    height: 600px;
    box-shadow: 5px 5px 10px rgba(0, 0, 0, .7);
}

#game > div {
    width: 100% !important;
    height: 100% !important;
}

#game canvas {
    width: 100% !important;
    height: 100% !important;
}


    .info {
      margin-top: 15px;
      font-size: 14px;
      opacity: 0.7;
    }
  </style>
</head>
<body>

  <h1><img src="imagens/pokemon_logo_PNG5.png" alt="logo"></h1>

  <div id="game"></div>

  <div class="info">
    Controles: Z (A) | X (B) | Enter (Start) | Shift (Select) | Setas (Mover)
  </div>

  <script>
    window.EJS_player = "#game";
    window.EJS_core = "gba";
    window.EJS_gameUrl = "roms/pokemon.gba";
    window.EJS_startOnLoaded = true;
    window.EJS_saveState = true;
  </script>

  <script src="https://www.emulatorjs.com/loader.js"></script>

</body>
</html>
